<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Prospector Pro — AI Agent System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f23 50%, #0a0a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        /* ===== Layout ===== */
        .app { display:flex; min-height:100vh; }
        .sidebar {
            width:200px; background:#12122a; border-right:1px solid #2a2a4a;
            padding:20px 0; flex-shrink:0; position:sticky; top:0; height:100vh; overflow-y:auto;
        }
        .sidebar-logo {
            padding:0 16px 20px; border-bottom:1px solid #2a2a4a; margin-bottom:8px;
            font-size:15px; font-weight:700; color:#fff; display:flex; align-items:center; gap:8px;
        }
        .sidebar-logo .icon { width:28px; height:28px; background:linear-gradient(135deg,#6666aa,#8888cc); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; }
        .sidebar-item {
            display:flex; align-items:center; gap:10px; padding:10px 16px; cursor:pointer;
            font-size:13px; color:#8888cc; transition:0.15s; border-left:3px solid transparent;
        }
        .sidebar-item:hover { background:#1a1a3a; color:#ccc; }
        .sidebar-item.active { background:#1a1a3e; color:#fff; border-left-color:#8888cc; }
        .sidebar-item .si-icon { width:20px; text-align:center; font-size:14px; }
        .main { flex:1; padding:24px 28px; max-width:1200px; }
        /* ===== Header ===== */
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
        .header h1 { font-size:20px; color:#fff; font-weight:600; }
        .header .sub { color:#6666aa; font-size:12px; margin-top:2px; }
        .header-actions { display:flex; gap:8px; align-items:center; }
        .header-date { font-size:12px; color:#5555aa; background:#1a1a3e; border:1px solid #2a2a4a; border-radius:6px; padding:6px 12px; }
        /* ===== Stats ===== */
        .top-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:20px; }
        .stat-card {
            background:linear-gradient(135deg,#1a1a3e,#15153a); border:1px solid #2a2a4a;
            border-radius:10px; padding:14px; text-align:center; transition:0.2s;
        }
        .stat-card:hover { border-color:#5555aa; transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,0,0,0.3); }
        .stat-card .val { font-size:22px; font-weight:700; }
        .stat-card .lbl { font-size:11px; color:#6666aa; margin-top:3px; text-transform:uppercase; letter-spacing:0.5px; }
        /* ===== Grid ===== */
        .agents { display:grid; grid-template-columns:repeat(auto-fit,minmax(420px,1fr)); gap:14px; }
        .card {
            background:linear-gradient(135deg,#1a1a3e,#15153a); border-radius:10px; padding:18px 20px;
            border:1px solid #2a2a4a; transition:0.2s;
        }
        .card:hover { border-color:#5555aa; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
        .card-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
        .card-header .emoji { font-size:22px; width:32px; text-align:center; }
        .card-header h2 { font-size:15px; color:#fff; font-weight:600; }
        .card-body { font-size:13px; line-height:1.6; }
        .full-width { grid-column:1/-1; }
        /* ===== Prospect Cards ===== */
        .prospect-card { background:#20204a; border-radius:8px; padding:10px 12px; margin-bottom:6px; border-left:3px solid #5555aa; }
        .prospect-card .biz { color:#66ddaa; font-weight:600; font-size:14px; }
        .prospect-card .meta { color:#7777aa; font-size:11px; margin-top:2px; }
        .prospect-card .score { float:right; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600; }
        .score.high { background:#1a4a2a; color:#66ddaa; }
        .score.med { background:#4a4a1a; color:#cccc66; }
        .score.low { background:#4a2a2a; color:#cc6666; }
        /* ===== Metrics ===== */
        .metric-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
        .metric { text-align:center; padding:10px; background:#20204a; border-radius:8px; }
        .metric .value { font-size:18px; font-weight:700; color:#66ddaa; }
        .metric .label { font-size:11px; color:#6666aa; margin-top:2px; }
        /* ===== Tips ===== */
        .tip-item { padding:6px 10px; background:#20204a; border-radius:6px; margin-bottom:4px; font-size:12px; }
        .tip-item::before { content:"→ "; color:#6666aa; }
        .section-title { color:#aa8844; font-size:12px; font-weight:600; margin:8px 0 4px; text-transform:uppercase; letter-spacing:0.5px; }
        .loading { text-align:center; padding:40px; color:#6666aa; font-size:14px; }
        .loading::after { content:'...'; animation:dots 1.5s infinite; }
        @keyframes dots { 0%,20% { opacity:0; } 50% { opacity:1; } 100% { opacity:0; } }
        /* ===== Buttons ===== */
        .refresh-btn { background:#2a2a4a; color:#ccc; border:1px solid #4a4a6a; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; transition:0.15s; }
        .refresh-btn:hover { background:#3a3a5a; border-color:#6666aa; }
        .btn-sm { padding:3px 8px; border-radius:5px; border:1px solid #4a4a6a; background:#2a2a4a; color:#aaa; cursor:pointer; font-size:11px; transition:0.15s; }
        .btn-sm:hover { background:#3a3a5a; }
        /* ===== Client Table ===== */
        .client-table { width:100%; border-collapse:collapse; margin-top:6px; font-size:12px; }
        .client-table th { text-align:left; color:#6666aa; font-size:10px; padding:5px 4px; border-bottom:1px solid #2a2a4a; text-transform:uppercase; letter-spacing:0.3px; }
        .client-table td { padding:5px 4px; border-bottom:1px solid #1e1e3e; vertical-align:middle; }
        .client-table tr:nth-child(even) td { background:rgba(255,255,255,0.02); }
        .client-table tr:hover td { background:#20204a; }
        .client-table tr { transition:0.1s; }
        /* ===== Status ===== */
        .status-badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
        .status-badge.lead { background:#2a2a5a; color:#8888cc; }
        .status-badge.contacted { background:#4a4a1a; color:#cccc66; }
        .status-badge.interested { background:#1a4a2a; color:#66ddaa; }
        .status-badge.closed { background:#2a4a4a; color:#66dddd; }
        .status-btn { padding:2px 5px; border-radius:3px; border:1px solid #3a3a5a; background:#1a1a3e; color:#8888cc; cursor:pointer; font-size:9px; margin:1px; transition:0.1s; }
        .status-btn:hover { background:#3a3a5a; }
        .status-btn.active { background:#3a6a3a; border-color:#66ddaa; color:#66ddaa; }
        /* ===== Forms ===== */
        .add-form { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
        .add-form input,.add-form select,.add-form textarea { background:#20204a; border:1px solid #3a3a5a; border-radius:6px; padding:6px 10px; color:#e0e0e0; font-size:12px; flex:1; min-width:80px; transition:0.15s; }
        .add-form input:focus,.add-form select:focus,.add-form textarea:focus { outline:none; border-color:#6666aa; box-shadow:0 0 0 2px rgba(100,100,170,0.15); }
        .add-form button { background:#3a6a3a; border:none; color:#88ddaa; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:600; font-size:12px; transition:0.15s; }
        .add-form button:hover { background:#4a7a4a; }
        .add-form button.blue { background:#3a5a7a; color:#88bbdd; }
        .add-form button.blue:hover { background:#4a6a8a; }
        .add-form button.orange { background:#7a5a3a; color:#ddbb88; }
        .add-form button.orange:hover { background:#8a6a4a; }
        .empty-state { text-align:center; padding:20px; color:#6666aa; font-size:13px; }
        .edit-inline { background:#20205a; border:1px solid #4a4a6a; border-radius:4px; padding:2px 6px; color:#e0e0e0; font-size:12px; width:100%; }
        /* ===== Tabs ===== */
        .tab-bar { display:flex; gap:4px; margin-bottom:12px; flex-wrap:wrap; }
        .tab { padding:5px 12px; border-radius:6px; cursor:pointer; font-size:12px; background:#2a2a4a; color:#8888cc; border:1px solid transparent; transition:0.15s; }
        .tab.active { background:#3a3a5a; color:#fff; border-color:#6666aa; }
        .tab:hover { border-color:#5555aa; }
        /* ===== Tags ===== */
        .tag { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:600; }
        .tag.nail { background:#4a2a3a; color:#dd88aa; }
        .tag.prospecting { background:#2a3a4a; color:#88aadd; }
        .tag.email { background:#2a4a3a; color:#88ddaa; }
        .tag.dev { background:#3a3a4a; color:#ccc; }
        .tag.general { background:#3a3a2a; color:#cccc88; }
        /* ===== Todo ===== */
        .todo-item { display:flex; align-items:center; gap:8px; padding:6px 10px; background:#20204a; border-radius:6px; margin-bottom:3px; transition:0.15s; }
        .todo-item:hover { background:#252555; }
        .todo-item.done { opacity:0.4; }
        .todo-item .todo-text { flex:1; font-size:12px; cursor:pointer; }
        .todo-item.done .todo-text { text-decoration:line-through; color:#6666aa; }
        .todo-item .todo-del { cursor:pointer; color:#cc6666; font-size:14px; background:none; border:none; line-height:1; }
        /* ===== Logs ===== */
        .log-item { padding:4px 8px; border-bottom:1px solid #1e1e3e; font-size:11px; display:flex; gap:8px; }
        .log-item .lt { color:#6666aa; white-space:nowrap; }
        .log-item .ld { flex:1; }
        .log-item .la { color:#66aa66; font-weight:600; text-transform:uppercase; font-size:9px; letter-spacing:0.3px; }
        /* ===== Animations ===== */
        .fade-in { animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width:4px; height:4px; }
        ::-webkit-scrollbar-track { background:#0a0a1a; }
        ::-webkit-scrollbar-thumb { background:#3a3a5a; border-radius:4px; }
        ::-webkit-scrollbar-thumb:hover { background:#5a5a8a; }

        .mobile-tab-bar { display:none; gap:4px; margin-bottom:12px; flex-wrap:wrap; }
        .mtab { padding:6px 14px; border-radius:6px; cursor:pointer; font-size:14px; background:#2a2a4a; color:#8888cc; border:1px solid transparent; transition:0.15s; text-align:center; flex:1; }
        .mtab.active { background:#3a3a5a; color:#fff; border-color:#6666aa; }
        @media (max-width:768px) {
            .sidebar { display:none; }
            .mobile-tab-bar { display:flex; }
            .main { padding:16px; }
            .agents { grid-template-columns:1fr; }
            .top-stats { grid-template-columns:repeat(2,1fr); gap:8px; }
            .header { flex-direction:column; align-items:flex-start; }
            .header-date { display:none; }
        }
        @media (max-width:480px) {
            .main { padding:12px; }
            .top-stats { grid-template-columns:repeat(2,1fr); gap:6px; }
            .stat-card { padding:10px; }
            .stat-card .val { font-size:18px; }
            .card { padding:14px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-logo">
                <div class="icon">P</div>
                Prospector Pro
            </div>
            <div class="sidebar-item active" data-tab="dashboard">
                <span class="si-icon">&#9632;</span> Dashboard
            </div>
            <div class="sidebar-item" data-tab="clients">
                <span class="si-icon">&#9679;</span> Clients
            </div>
            <div class="sidebar-item" data-tab="campaigns">
                <span class="si-icon">&#9993;</span> Campaigns
            </div>
            <div class="sidebar-item" data-tab="nailart">
                <span class="si-icon">&#9830;</span> Nail Art Hub
            </div>
            <div class="sidebar-item" data-tab="todos">
                <span class="si-icon">&#9744;</span> To-Do
            </div>
            <div class="sidebar-item" data-tab="logs">
                <span class="si-icon">&#9776;</span> Logs
            </div>
        </div>
        <div class="main">
            <div class="header">
                <div>
                    <h1>Client Prospector Pro</h1>
                    <div class="sub">AI-powered lead gen, email campaigns &amp; business tracker</div>
                </div>
                <div class="header-actions">
                    <span class="header-date" id="headerDate"></span>
                    <button class="refresh-btn" onclick="location.reload()">Refresh</button>
                </div>
            </div>

            <div class="top-stats" id="topStats">
                <div class="stat-card"><div class="val" style="color:#66ddaa">--</div><div class="lbl">Total Clients</div></div>
                <div class="stat-card"><div class="val" style="color:#cccc66">--</div><div class="lbl">Active Leads</div></div>
                <div class="stat-card"><div class="val" style="color:#66dddd">--</div><div class="lbl">Contacted</div></div>
                <div class="stat-card"><div class="val" style="color:#fff">--</div><div class="lbl">Closed</div></div>
                <div class="stat-card"><div class="val" style="color:#cc6666">--</div><div class="lbl">Conversion</div></div>
            </div>

            <div class="mobile-tab-bar" id="mobileTabs">
                <div class="mtab active" data-tab="dashboard">&#9632;</div>
                <div class="mtab" data-tab="clients">&#9679;</div>
                <div class="mtab" data-tab="campaigns">&#9993;</div>
                <div class="mtab" data-tab="nailart">&#9830;</div>
                <div class="mtab" data-tab="todos">&#9744;</div>
                <div class="mtab" data-tab="logs">&#9776;</div>
            </div>
            <div class="agents" id="agents-container">
                <div class="loading">Loading dashboard</div>
            </div>
        </div>
    </div>

    <script>
        let allClients = [];
        let allRevenue = [];
        let nailsData = { total: 0, unique_clients: 0, revenue_total: 0, services: {}, branches: {} };

        document.getElementById('mobileTabs').addEventListener('click', e => {
            const tab = e.target.closest('.mtab');
            if (!tab) return;
            document.querySelectorAll('.mtab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.sidebar-item').forEach(t => t.classList.toggle('active', t.dataset.tab === tab.dataset.tab));
            renderCurrentTab(tab.dataset.tab);
        });

        document.querySelector('.sidebar').addEventListener('click', e => {
            const item = e.target.closest('.sidebar-item');
            if (!item) return;
            document.querySelectorAll('.sidebar-item').forEach(t => t.classList.remove('active'));
            item.classList.add('active');
            document.querySelectorAll('.mtab').forEach(t => t.classList.toggle('active', t.dataset.tab === item.dataset.tab));
            renderCurrentTab(item.dataset.tab);
        });

        document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

        function renderCurrentTab(tab) {
            const c = document.getElementById('agents-container');
            if (tab === 'dashboard') renderDashboard(c);
            else if (tab === 'clients') renderClientManager(c);
            else if (tab === 'campaigns') renderCampaigns(c);
            else if (tab === 'nailart') renderNailArt(c);
            else if (tab === 'todos') renderTodos(c);
            else if (tab === 'logs') renderLogs(c);
        }

        async function loadAll() {
            try {
                const [statsRes, clientsRes, revRes, agentsRes, nailRes, campaignRes, todoRes, logRes] = await Promise.all([
                    fetch('/api/stats'), fetch('/api/clients'), fetch('/api/revenue'),
                    fetch('/api/agents'), fetch('/api/nailart'), fetch('/api/campaigns'),
                    fetch('/api/todos'), fetch('/api/logs')
                ]);
                const stats = await statsRes.json();
                allClients = await clientsRes.json();
                allRevenue = await revRes.json();
                const agentData = await agentsRes.json();
                nailsData = await nailRes.json();
                const campaigns = await campaignRes.json();
                const todos = await todoRes.json();
                const logs = await logRes.json();

                renderStats(stats);
                const c = document.getElementById('agents-container');
                c.classList.add('fade-in');
                renderDashboard(c, agentData);
                window._agentData = agentData;
                window._campaigns = campaigns;
                window._todos = todos;
                window._logs = logs;
            } catch(e) {
                document.getElementById('agents-container').innerHTML = `<div class="loading">Error: ${e.message}</div>`;
            }
        }

        function renderStats(s) {
            document.querySelector('.top-stats').innerHTML = `
                <div class="stat-card"><div class="val" style="color:#66ddaa">${s.total_clients}</div><div class="lbl">Total Clients</div></div>
                <div class="stat-card"><div class="val" style="color:#cccc66">${s.active_leads}</div><div class="lbl">Active Leads</div></div>
                <div class="stat-card"><div class="val" style="color:#66dddd">${s.contacted}</div><div class="lbl">Contacted</div></div>
                <div class="stat-card"><div class="val" style="color:#fff">${s.closed}</div><div class="lbl">Closed</div></div>
                <div class="stat-card"><div class="val" style="color:#cc6666">${s.conversion}%</div><div class="lbl">Conversion</div></div>`;
        }

        function renderDashboard(c, data) {
            if (!data) { c.innerHTML = '<div class="loading">Loading...</div>'; return; }
            const pl = data.pipeline.data;
            c.innerHTML = `
            <div class="card full-width">
                <div class="card-header"><span class="emoji">💰</span><h2>Revenue Tracker</h2></div>
                <div class="card-body">
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px">
                        <div class="metric"><div class="value" style="color:#66dddd">₹${allRevenue.today.toLocaleString()}</div><div class="label">Today</div></div>
                        <div class="metric"><div class="value" style="color:#8888cc">₹${allRevenue.yesterday.toLocaleString()}</div><div class="label">Yesterday</div></div>
                        <div class="metric"><div class="value" style="color:#cccc66">₹${allRevenue.this_week.toLocaleString()}</div><div class="label">This Week</div></div>
                        <div class="metric"><div class="value" style="color:#66ddaa">₹${allRevenue.this_month.toLocaleString()}</div><div class="label">This Month</div></div>
                        <div class="metric"><div class="value" style="color:#fff">₹${allRevenue.all_time.toLocaleString()}</div><div class="label">All Time</div></div>
                    </div>
                    <div class="add-form">
                        <input type="text" id="revClient" placeholder="Client name" style="flex:1">
                        <input type="number" id="revAmount" placeholder="Amount" style="flex:0.4">
                        <input type="date" id="revDate" style="flex:0.3">
                        <button onclick="addRevenue()">+ Add</button>
                    </div>
                    ${allRevenue.entries.length > 5 ? `<details><summary style="cursor:pointer;color:#8888cc;font-size:13px">History (${allRevenue.entries.length})</summary>` : ''}
                    ${allRevenue.entries.length ? `<table class="client-table"><tr><th>Date</th><th>Client</th><th>Amount</th><th></th></tr>
                        ${allRevenue.entries.slice().reverse().slice(0,10).map(e => `<tr><td style="color:#8888cc">${e.date}</td><td>${e.client}</td><td style="color:#66ddaa;font-weight:600">₹${e.amount.toLocaleString()}</td><td><button class="btn-sm" onclick="deleteRev(${e.id})" style="color:#cc6666;border-color:#4a2a2a">x</button></td></tr>`).join('')}
                    </table>` : '<div class="empty-state">No revenue entries yet</div>'}
                    ${allRevenue.entries.length > 5 ? '</details>' : ''}
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="emoji">${data.pipeline.emoji}</span><h2>${data.pipeline.name}</h2></div>
                <div class="card-body">
                    <div class="metric-grid">
                        <div class="metric"><div class="value">${pl.leads}</div><div class="label">Leads</div></div>
                        <div class="metric"><div class="value">${pl.contacted}</div><div class="label">Contacted</div></div>
                        <div class="metric"><div class="value">${pl.interested}</div><div class="label">Interested</div></div>
                        <div class="metric"><div class="value">${pl.closed}</div><div class="label">Closed</div></div>
                    </div>
                    <div class="metric-grid" style="margin-top:10px;grid-template-columns:1fr 1fr">
                        <div class="metric"><div class="value" style="font-size:15px">${pl.revenue_potential}</div><div class="label">Revenue Potential</div></div>
                        <div class="metric"><div class="value">${pl.conversion_rate}</div><div class="label">Conversion</div></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="emoji">${data.prospector.emoji}</span><h2>${data.prospector.name}</h2></div>
                <div class="card-body">
                    ${data.prospector.data.map(p => {
                        let sc = p.lead_score >= 70 ? 'high' : p.lead_score >= 50 ? 'med' : 'low';
                        return `<div class="prospect-card">
                            <span class="score ${sc}">${p.lead_score}%</span>
                            <div class="biz">${p.business}</div>
                            <div class="meta">${p.niche} · ${p.location} · ${p.reason}</div>
                            <div class="meta">${p.contact}${p.notes ? ' · '+p.notes : ''}</div>
                            <div style="margin-top:6px">
                                <button class="btn-sm" onclick="toggleMsgs(${p.id})">Show Messages</button>
                                <div id="msgs-${p.id}" style="display:none;margin-top:6px">
                                    ${p.messages.slice(0,3).map((m, i) => `
                                        <div style="background:#1a1a2e;border-radius:6px;padding:6px 8px;margin-bottom:4px;font-size:12px;border:1px solid #3a3a5a;display:flex;justify-content:space-between;align-items:flex-start">
                                            <span style="flex:1;margin-right:6px">${m}</span>
                                            <button class="btn-sm" onclick="copyMsg(this)" style="background:#4a6a4a;color:#88ddaa;border:none" data-msg="${m.replace(/"/g,'&quot;')}">Copy</button>
                                        </div>`).join('')}
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="emoji">${data.outreach.emoji}</span><h2>${data.outreach.name}</h2></div>
                <div class="card-body">
                    <div class="section-title">Platforms</div>

                <div class="card-body">

                    ${camps.length === 0 ? '<div class="empty-state">No campaigns yet</div>' : camps.map(camp => `

                        ${camp.status === 'draft' ? `<button class="btn-sm" style="margin-top:6px;background:#4a6a4a" onclick="sendCampaign(${camp.id})">Send Now</button>` : ''}
                    </div>`).join('')}
                </div>
            </div>
            <div class="card full-width">
                <div class="card-header"><span class="emoji">📤</span><h2>Quick Email</h2></div>
                <div class="card-body">
                    <div class="add-form">
                        <input type="email" id="qEmail" placeholder="To email *" style="flex:1">
                        <input type="text" id="qSubject" placeholder="Subject *" style="flex:1">
                    </div>
                    <textarea id="qBody" style="width:100%;background:#252550;border:1px solid #4a4a6a;border-radius:6px;padding:8px;color:#e0e0e0;font-size:13px;min-height:80px;margin-top:6px" placeholder="Email body..."></textarea>
                    <button style="margin-top:6px;background:#4a6a4a;border:none;color:#88ddaa;padding:7px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px" onclick="sendQuickEmail()">Send Email</button>
                    <div id="qEmailResult" style="margin-top:6px;font-size:12px"></div>
                </div>
            </div>`;
        }

        function renderNailArt(c) {
            c.innerHTML = `
            <div class="card full-width">
                <div class="card-header"><span class="emoji">💅</span><h2>Nail Art Hub — Client Data</h2></div>
                <div class="card-body">
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px">
                        <div class="metric"><div class="value" style="color:#dd88aa">${nailsData.total}</div><div class="label">Total Bookings</div></div>
                        <div class="metric"><div class="value" style="color:#dd88aa">${nailsData.unique_clients}</div><div class="label">Unique Clients</div></div>
                        <div class="metric"><div class="value" style="color:#dd88aa">₹${(nailsData.revenue_total || 0).toLocaleString()}</div><div class="label">Booking Revenue</div></div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                        <div style="background:#252550;border-radius:8px;padding:12px">
                            <div class="section-title" style="margin-top:0">Services Booked</div>
                            ${Object.keys(nailsData.services || {}).length === 0 ? '<div style="color:#8888cc;font-size:13px">No service data</div>' :
                            Object.entries(nailsData.services).map(([k,v]) => `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #2a2a4a"><span>${k}</span><span style="color:#dd88aa;font-weight:600">${v}</span></div>`).join('')}
                        </div>
                        <div style="background:#252550;border-radius:8px;padding:12px">

                            ${Object.keys(nailsData.branches || {}).length === 0 ? '<div style="color:#8888cc;font-size:13px">No branch data</div>' :
                            Object.entries(nailsData.branches).map(([k,v]) => `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #2a2a4a"><span>${k}</span><span style="color:#dd88aa;font-weight:600">${v}</span></div>`).join('')}
                        </div>
                    </div>
                </div>
            </div>
            <div class="card full-width">
                <div class="card-header"><span class="emoji">📥</span><h2>Import Nail Art Clients as Leads</h2></div>
                <div class="card-body">
                    <p style="color:#8888cc;font-size:13px;margin-bottom:8px">Convert Nail Art Hub booking clients into prospector leads to track and follow up.</p>
                    <button class="btn-sm" style="background:#4a6a4a;padding:8px 16px;font-size:13px" onclick="importNailClients()">Import as Leads</button>
                    <div id="importResult" style="margin-top:8px;font-size:13px"></div>
                </div>
            </div>`;
        }

        async function importNailClients() {
            const r = document.getElementById('importResult');
            r.innerHTML = 'Importing...';
            try {
                const res = await fetch('/api/nailart/bookings');
                const bookings = await res.json();
                const names = [...new Set(bookings.map(b => b.client_name).filter(n => n))];
                const existing = new Set(allClients.map(c => c.business.toLowerCase()));
                const newNames = names.filter(n => !existing.has(n.toLowerCase()));
                if (newNames.length === 0) {
                    r.innerHTML = 'All clients already imported!';
                    return;
                }
                await fetch('/api/clients/bulk', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ names: newNames, status: 'lead', niche: 'beauty/nails' })
                });
                r.innerHTML = `Imported ${newNames.length} new leads! Reloading...`;
                setTimeout(() => location.reload(), 1000);
            } catch(e) {
                r.innerHTML = `Error: ${e.message}`;
            }
        }

        function renderTodos(c) {
            const todos = window._todos || [];
            c.innerHTML = `
            <div class="card full-width">
                <div class="card-header"><span class="emoji">+</span><h2>Add To-Do</h2></div>
                <div class="card-body">
                    <div class="add-form">
                        <input type="text" id="todoText" placeholder="What needs to be done? *" style="flex:2">
                        <select id="todoPriority" style="flex:0.3">
                            <option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option>
                        </select>
                        <select id="todoCategory" style="flex:0.3">
                            <option value="general">General</option><option value="prospecting">Prospecting</option>
                            <option value="nailart">Nail Art Hub</option><option value="email">Email</option>
                            <option value="dev">Dev</option>
                        </select>
                        <button onclick="addTodo()">+ Add</button>
                    </div>
                </div>
            </div>
            <div class="card full-width">
                <div class="card-header"><span class="emoji">${todos.filter(t => !t.done).length}</span><h2>To-Do List</h2></div>
                <div class="card-body">
                    ${todos.length === 0 ? '<div class="empty-state">Nothing yet!</div>' : 
                    todos.map(t => `<div class="todo-item ${t.done ? 'done' : ''}">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
                        <span class="todo-text" onclick="toggleTodo(${t.id})">${t.text}</span>
                        <span class="tag ${t.category}">${t.category}</span>
                        <span style="font-size:11px;color:#8888cc">${t.priority}</span>
                        <button class="todo-del" onclick="deleteTodo(${t.id})">x</button>
                    </div>`).join('')}
                </div>
            </div>`;

        function renderLogs(c) {
            const logs = window._logs || [];
            c.innerHTML = `
            <div class="card full-width">
                <div class="card-header"><span class="emoji">📋</span><h2>Activity Log (last 50)</h2></div>
                <div class="card-body">
                    ${logs.length === 0 ? '<div class="empty-state">No activity yet</div>' :
                    logs.map(l => `<div class="log-item">
                        <span class="lt">${new Date(l.timestamp).toLocaleString()}</span>
                        <span class="la">${l.action}</span>
                        <span class="ld">${l.detail}</span>
                    </div>`).join('')}
                </div>

        async function addRevenue() {
            const client = document.getElementById('revClient').value.trim();
            const amount = document.getElementById('revAmount').value;
            const date = document.getElementById('revDate').value || new Date().toISOString().split('T')[0];
            if (!client || !amount) return;
            await fetch('/api/revenue', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ client, amount: parseInt(amount), date })
            });
            location.reload();
        }
        async function deleteRev(id) {
            if (!confirm('Delete?')) return;
            await fetch('/api/revenue/' + id, { method: 'DELETE' });
            location.reload();
        }

        async function addClient() {
            const name = document.getElementById('newName').value.trim();
            if (!name) return;
            await fetch('/api/clients', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    business: name,
                    niche: document.getElementById('newNiche').value.trim(),
                    contact: document.getElementById('newContact').value.trim(),
                    email: document.getElementById('newEmail').value.trim(),
                    phone: document.getElementById('newPhone').value.trim()
                })
            });
            location.reload();
        }

        async function bulkAdd() {
            const text = document.getElementById('bulkInput').value.trim();
            if (!text) return;
            const names = text.split('\n').map(n => n.trim()).filter(n => n);
            const status = document.getElementById('bulkStatus').value;
            const niche = document.getElementById('bulkNiche').value.trim();
            await fetch('/api/clients/bulk', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ names, status, niche })
            });
            location.reload();
        }

        async function updateStatus(id, status) {
            await fetch('/api/clients/' + id + '/status', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status})
            });
            location.reload();
        }

        async function deleteClient(id) {
            if (!confirm('Delete?')) return;
            await fetch('/api/clients/' + id, { method: 'DELETE' });
            location.reload();
        }

        function editClient(id) {
            const row = document.getElementById('client-row-' + id);
            if (!row) return;
            const c = allClients.find(x => x.id === id);
            if (!c) return;
            const html = row.innerHTML;
            row.innerHTML = `<td><input class="edit-inline" id="eb-${id}-name" value="${c.business}"></td>
                <td><input class="edit-inline" id="eb-${id}-niche" value="${c.niche || ''}"></td>
                <td><input class="edit-inline" id="eb-${id}-contact" value="${c.contact || ''}" style="width:100%"></td>
                <td><span class="status-badge ${c.status}">${c.status}</span></td>
                <td><input class="edit-inline" id="eb-${id}-score" value="${c.lead_score}" style="width:40px"></td>
                <td><button class="btn-sm" style="background:#4a6a4a" onclick="saveEdit(${id})">Save</button>
                    <button class="btn-sm" onclick="location.reload()">Cancel</button></td>`;
        }

        async function saveEdit(id) {
            const data = {
                business: document.getElementById('eb-' + id + '-name').value,
                niche: document.getElementById('eb-' + id + '-niche').value,
                contact: document.getElementById('eb-' + id + '-contact').value,
                lead_score: parseInt(document.getElementById('eb-' + id + '-score').value) || 50
            };
            await fetch('/api/clients/' + id, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            location.reload();
        }

        function toggleMsgs(id) {
            const el = document.getElementById('msgs-' + id);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }
        function copyMsg(btn) {
            const msg = btn.getAttribute('data-msg');
            navigator.clipboard.writeText(msg).then(() => {
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
            });
        }

        async function createCampaign() {
            const name = document.getElementById('campName').value.trim();
            const subject = document.getElementById('campSubject').value.trim();
            const body = document.getElementById('campBody').value.trim();
            const target = document.getElementById('campTarget').value;
            if (!name || !subject || !body) { alert('Fill name, subject and body'); return; }
            await fetch('/api/campaigns', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, subject, body, target_status: target })
            });
            location.reload();
        }

        async function sendCampaign(id) {
            if (!confirm('Send this campaign?')) return;
            const r = await fetch('/api/campaigns/' + id + '/send', { method: 'POST' });
            const result = await r.json();
            alert(`Sent to ${result.sent || 0} clients`);
            location.reload();
        }

        async function sendQuickEmail() {
            const to = document.getElementById('qEmail').value.trim();
            const subj = document.getElementById('qSubject').value.trim();
            const body = document.getElementById('qBody').value.trim();
            const r = document.getElementById('qEmailResult');
            if (!to || !subj || !body) { r.innerHTML = 'Fill all fields'; return; }
            r.innerHTML = 'Sending...';
            const res = await fetch('/api/send-email', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ to, subject: subj, body })
            });
            const result = await res.json();
            r.innerHTML = result.success ? 'Sent!' : `Error: ${result.error}`;
        }

        async function addTodo() {
            const text = document.getElementById('todoText').value.trim();
            if (!text) return;
            const priority = document.getElementById('todoPriority').value;
            const category = document.getElementById('todoCategory').value;
            await fetch('/api/todos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text, priority, category })
            });
            location.reload();
        }
        async function toggleTodo(id) {
            await fetch('/api/todos/' + id, { method: 'PUT' });
            location.reload();
        }
        async function deleteTodo(id) {
            await fetch('/api/todos/' + id, { method: 'DELETE' });
            location.reload();
        }

        loadAll();
    </script>
